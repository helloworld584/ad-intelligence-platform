services:
  - type: web
    name: ad-intelligence-api
    runtime: python
    buildCommand: pip install -r model/requirements.txt
    startCommand: uvicorn model.predict_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
